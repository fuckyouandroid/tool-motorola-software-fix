name: Download Lenovo EXE with LFS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Track EXE with Git LFS
        run: |
          git lfs track "*.exe"
          cat .gitattributes

      - name: Download Lenovo EXE
        run: |
          curl -L \
            "https://download.lenovo.com/lsa/Releases/Software_Fix_v7.5.5.19_prod_setup.exe" \
            -o "Software_Fix_v7.5.5.19_prod_setup.exe"

      - name: Verify LFS tracking
        run: |
          git lfs status
          git check-attr filter -- "Software_Fix_v7.5.5.19_prod_setup.exe"
          ls -lh "Software_Fix_v7.5.5.19_prod_setup.exe"
          sha256sum "Software_Fix_v7.5.5.19_prod_setup.exe"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .gitattributes
          git add "Software_Fix_v7.5.5.19_prod_setup.exe"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add Lenovo Software Fix installer with Git LFS"
            git push
          fi
